version: "3.8"

services:
  postgresql:
    container_name: ms_pg_sql
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - PGDATA=/data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5444:5432"
    networks:
      - finance
    restart: unless-stopped

  pgadmin:
    container_name: ms_pgadmin
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-admin}
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - finance
    restart: unless-stopped

  mongodb:
    image: mongo
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=glaymet
      - MONGO_INITDB_ROOT_PASSWORD=glaymet
    networks:
      - finance
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    container_name: mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=glaymet
      - ME_CONFIG_MONGODB_ADMINPASSWORD=glaymet
      - ME_CONFIG_MONGODB_SERVER=mongo_db
    networks:
      - finance

volumes:
  mongo:
  postgres:
  pgadmin:

networks:
  finance:
